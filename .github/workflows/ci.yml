name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Минимальные права для GITHUB_TOKEN: воркфлоу только читает код.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions запинены на SHA релизных тегов (Dependabot обновляет SHA + комментарий).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest --tb=short --cov=app --cov-report=term-missing

      - name: Type check
        run: mypy app/

      - name: Dependency audit
        # Информационный шаг: не валит сборку, чтобы транзитивные advisories не
        # блокировали мерж. Смотри вывод и поднимай floor в pyproject при High+.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit
